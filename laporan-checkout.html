<script>

const tbody =
document.getElementById("orders-table");

// ======================
// LOAD ORDER
// ======================

database.ref("orders")
.orderByChild("createdAt")
.on("value",(snap)=>{

tbody.innerHTML="";

if(!snap.exists()){

tbody.innerHTML=`

<tr>

<td colspan="6" class="text-center p-5">

Belum ada pesanan

</td>

</tr>

`;

return;

}

let data=[];

snap.forEach(item=>{

data.push({

id:item.key,

...item.val()

});

});

data.reverse();

data.forEach(o=>{

tbody.innerHTML+=`

<tr class="border-b">

<td class="p-3">

${o.id}

</td>

<td class="p-3">

${o.customerName || "-"}

</td>

<td class="p-3">

Rp ${Number(o.total||0).toLocaleString("id-ID")}

</td>

<td class="p-3">

<span>

${o.status || "Pending"}

</span>

</td>

<td class="p-3">

${new Date(o.createdAt||Date.now()).toLocaleString("id-ID")}

</td>

<td class="p-3">

<button

onclick="ubahStatus('${o.id}')"

class="text-blue-600">

Status

</button>

|

<button

onclick="hapusOrder('${o.id}')"

class="text-red-600">

Hapus

</button>

</td>

</tr>

`;

});

});

// ======================
// HAPUS
// ======================

function hapusOrder(id){

if(!confirm("Hapus pesanan?")) return;

database.ref("orders/"+id).remove();

}

// ======================
// UBAH STATUS
// ======================

function ubahStatus(id){

database.ref("orders/"+id)

.once("value",(snap)=>{

const order=snap.val();

const status=prompt(

`Status Baru

Pending
Diproses
Dikirim
Selesai
Dibatalkan`,

order.status || "Pending"

);

if(status==null) return;

database.ref("orders/"+id)

.update({

status:status,

updatedAt:Date.now()

});

});

}

</script>
