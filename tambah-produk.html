<script>
const kategoriSelect = document.getElementById("prod-category");

// =====================
// LOAD KATEGORI
// =====================
database.ref("kategori").on("value", snap => {
    kategoriSelect.innerHTML = "";
    
    if(!snap.exists()) {
        kategoriSelect.innerHTML = `<option value="">Belum ada kategori</option>`;
        return;
    }

    snap.forEach(item => {
        let val = item.val();
        let nama = (typeof val === 'object' && val !== null) ? (val.nama || "") : val;
        if(nama) {
            kategoriSelect.innerHTML += `<option value="${nama}">${nama}</option>`;
        }
    });
});

// =====================
// SIMPAN PRODUK
// =====================
document.getElementById("form-add-product").addEventListener("submit", async function(e) {
    e.preventDefault();

    const nama = document.getElementById("prod-name").value.trim();
    const harga = Number(document.getElementById("prod-price").value);
    const kategori = document.getElementById("prod-category").value;
    const lokasi = document.getElementById("prod-location").value.trim();
    const layanan = document.getElementById("prod-service").value;
    const deskripsi = document.getElementById("prod-description").value.trim();
    const allowCredit = document.getElementById("prod-credit").checked;

    if(!nama || !harga || !kategori) {
        alert("Mohon lengkapi nama, harga, dan kategori produk!");
        return;
    }

    let listFoto = [];
    const fileInput = document.getElementById("prod-image");
    const file = fileInput ? fileInput.files[0] : null;

    try {
        // Indikator loading opsional / pencegah klik ganda
        const submitBtn = this.querySelector('button[type="submit"]');
        if(submitBtn) submitBtn.disabled = true;

        // Upload gambar jika ada
        if (file) {
            const namaFile = "produk/" + Date.now() + "_" + file.name;
            const fileRef = storage.ref(namaFile);
            await fileRef.put(file);
            const url = await fileRef.getDownloadURL();
            listFoto.push(url);
        }

        // Buat ID unik produk
        const id = database.ref("produk").push().key;

        // Simpan data ke Realtime Database
        await database.ref("produk/" + id).set({
            nama,
            harga,
            kategori,
            lokasi: lokasi || "Tebing Tinggi",
            layanan,
            deskripsi,
            allowCredit,
            listFoto,
            status: true,
            createdAt: Date.now()
        });

        alert("Produk berhasil ditambahkan.");
        this.reset();
        
        if(submitBtn) submitBtn.disabled = false;
    } catch (err) {
        console.error("Gagal menyimpan produk:", err);
        alert("Terjadi kesalahan: " + err.message);
        const submitBtn = this.querySelector('button[type="submit"]');
        if(submitBtn) submitBtn.disabled = false;
    }
});
</script>
