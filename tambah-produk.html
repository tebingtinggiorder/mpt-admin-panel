<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tambah Produk - Panel Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/auth-guard.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 flex h-screen overflow-hidden">
    <!-- Masukkan struktur sidebar sama seperti dashboard -->
    <main class="flex-1 flex flex-col h-full overflow-y-auto p-6">
        <h1 class="text-xl font-bold mb-4">Form Tambah Produk Baru</h1>
        <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200 max-w-2xl">
            <form id="form-add-product" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Nama Produk</label>
                    <input type="text" id="prod-name" class="w-full border rounded p-2 text-sm" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Harga (Rp)</label>
                    <input type="number" id="prod-price" class="w-full border rounded p-2 text-sm" required>
                </div>
                <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded text-sm font-medium">Simpan Produk</button>
            </form>
        </div>
    </main>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="firebase-init.js"></script>
<script src="auth-guard.js"></script>
    <script>
        document.getElementById('form-add-product').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('prod-name').value;
            const price = document.getElementById('prod-price').value;
            database.ref('products').push({ name, price, createdAt: Date.now() }).then(() => {
                alert('Produk berhasil ditambahkan!');
                this.reset();
            });
        });
    </script>
</body>
</html>
