<script>

const kategoriSelect =
document.getElementById("prod-category");

// =====================
// LOAD KATEGORI
// =====================

database.ref("kategori")
.on("value",snap=>{

kategoriSelect.innerHTML="";

snap.forEach(item=>{

let nama=item.val().nama || item.val();

kategoriSelect.innerHTML+=`

<option>

${nama}

</option>

`;

});

});

// =====================
// SIMPAN PRODUK
// =====================

document
.getElementById("form-add-product")

.addEventListener("submit",

async function(e){

e.preventDefault();

const nama =
document.getElementById("prod-name").value;

const harga =
Number(document.getElementById("prod-price").value);

const kategori =
document.getElementById("prod-category").value;

const lokasi =
document.getElementById("prod-location").value;

const layanan =
document.getElementById("prod-service").value;

const deskripsi =
document.getElementById("prod-description").value;

const allowCredit =
document.getElementById("prod-credit").checked;

let listFoto=[];

// upload gambar

const file =
document.getElementById("prod-image").files[0];

if(file){

const namaFile=
"produk/"+Date.now()+"_"+file.name;

const ref=
storage.ref(namaFile);

await ref.put(file);

const url=
await ref.getDownloadURL();

listFoto.push(url);

}

// buat id

const id=
database.ref("produk").push().key;

// simpan

await database.ref("produk/"+id).set({

nama,

harga,

kategori,

lokasi,

layanan,

deskripsi,

allowCredit,

listFoto,

status:true,

createdAt:Date.now()

});

alert("Produk berhasil ditambahkan.");

this.reset();

});

</script>
