<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola User - MPT Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-100 font-sans">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-slate-900 text-slate-300 hidden md:flex flex-col justify-between">
            <div class="p-5">
                <h1 class="text-white text-xl font-bold mb-6">🎋 MPT ADMIN</h1>
                <nav class="space-y-2">
                    <a href="index.html" class="block py-2.5 px-4 rounded hover:bg-slate-800 transition">Dashboard</a>
                    <a href="tambah-produk.html" class="block py-2.5 px-4 rounded hover:bg-slate-800 transition">Tambah Produk</a>
                    <a href="kelola-katalog.html" class="block py-2.5 px-4 rounded hover:bg-slate-800 transition">Kelola Katalog</a>
                    <a href="kelola-kategori.html" class="block py-2.5 px-4 rounded hover:bg-slate-800 transition">Kelola Kategori</a>
                    <a href="laporan-checkout.html" class="block py-2.5 px-4 rounded hover:bg-slate-800 transition">Laporan Checkout</a>
                    <a href="kelola-user.html" class="block py-2.5 px-4 rounded bg-blue-600 text-white font-medium">Kelola User</a>
                    <a href="pengaturan-toko.html" class="block py-2.5 px-4 rounded hover:bg-slate-800 transition">Pengaturan Toko</a>
                </nav>
            </div>
            <div class="p-5 border-t border-slate-800">
                <a href="index.html" class="block text-center bg-red-600 hover:bg-red-700 text-white py-2 rounded transition font-medium">Kembali</a>
            </div>
        </aside>

        <div class="flex-1 flex flex-col overflow-y-auto p-6">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                <h2 class="text-xl font-bold text-slate-800 mb-4">👥 Daftar Akun & Pengunjung Toko</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse text-sm">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200 text-slate-600">
                                <th class="p-3">Nama Pengguna</th>
                                <th class="p-3">Kontak / Email</th>
                                <th class="p-3">Role</th>
                                <th class="p-3">Status</th>
                                <th class="p-3">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="user-table" class="divide-y divide-slate-100">
                            <tr><td colspan="5" class="text-center p-4 text-slate-400">Memuat data user...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Inisialisasi Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAHFgI1sxXMxu9umSfCQMLB2j4C2zH87N8",
            authDomain: "tebingtinggiorder.firebaseapp.com",
            databaseURL: "https://tebingtinggiorder-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tebingtinggiorder",
            storageBucket: "tebingtinggiorder.firebasestorage.app",
            messagingSenderId: "374470707588",
            appId: "1:374470707588:web:d1fa72f4832753b401f5d1",
            measurementId: "G-BPKTES3HPY"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        // Definisikan database secara global di tingkat script
        const database = firebase.database();

        document.addEventListener("DOMContentLoaded", () => {
            const tbody = document.getElementById("user-table");
            if (!tbody) return;

            database.ref("users").on("value", (snap) => {
                tbody.innerHTML = "";
                if (!snap.exists()) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center p-4 text-slate-400">Belum ada user</td></tr>`;
                    return;
                }

                try {
                    snap.forEach(item => {
                        const u = item.val() || {};
                        const isActive = u.active !== false;
                        const namaUser = u.nama || u.name || "-";
                        const emailUser = u.email || u.kontak || "-";
                        const roleUser = u.role || "customer";

                        tbody.innerHTML += `
                            <tr class="border-b hover:bg-slate-50 transition">
                                <td class="p-3 font-medium text-slate-800">${namaUser}</td>
                                <td class="p-3 text-slate-600">${emailUser}</td>
                                <td class="p-3 text-slate-600">${roleUser}</td>
                                <td class="p-3">
                                    <span class="px-2 py-1 rounded text-xs font-semibold ${isActive ? 'bg-emerald-100 text-emerald-800' : 'bg-red-100 text-red-800'}">
                                        ${isActive ? 'Aktif' : 'Nonaktif'}
                                    </span>
                                </td>
                                <td class="p-3 space-x-1">
                                    <button onclick="ubahRole('${item.key}')" class="text-blue-600 font-medium hover:underline">Role</button>
                                    <span>|</span>
                                    <button onclick="toggleUser('${item.key}', ${!isActive})" class="text-amber-600 font-medium hover:underline">
                                        ${isActive ? 'Nonaktifkan' : 'Aktifkan'}
                                    </button>
                                    <span>|</span>
                                    <button onclick="hapusUser('${item.key}')" class="text-red-600 font-medium hover:underline">Hapus</button>
                                </td>
                            </tr>
                        `;
                    });
                } catch (err) {
                    console.error("Error parsing users:", err);
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center p-4 text-red-500">Gagal memuat struktur data user.</td></tr>`;
                }
            });
        });

        function toggleUser(id, status) {
            database.ref("users/" + id).update({ active: status }).catch(err => alert("Gagal ubah status: " + err.message));
        }

        function ubahRole(id) {
            database.ref("users/" + id).once("value", (snap) => {
                const u = snap.val() || {};
                const role = prompt("Role Baru (contoh: admin / customer):", u.role || "customer");
                if (role == null) return;
                database.ref("users/" + id).update({ role: role }).catch(err => alert("Gagal ubah role: " + err.message));
            });
        }

        function hapusUser(id) {
            if (!confirm("Hapus user ini?")) return;
            database.ref("users/" + id).remove().catch(err => alert("Gagal menghapus: " + err.message));
        }
    </script>
</body>
</html>
