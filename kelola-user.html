<script>

const tbody =
document.getElementById("user-table");

database.ref("users")
.on("value",(snap)=>{

tbody.innerHTML="";

if(!snap.exists()){

tbody.innerHTML=`

<tr>

<td colspan="5">

Belum ada user

</td>

</tr>

`;

return;

}

snap.forEach(item=>{

const u=item.val();

tbody.innerHTML+=`

<tr class="border-b">

<td class="p-2">

${u.nama || "-"}

</td>

<td class="p-2">

${u.email || "-"}

</td>

<td class="p-2">

${u.role || "customer"}

</td>

<td class="p-2">

${u.active===false

?'<span style="color:red">Nonaktif</span>'

:'<span style="color:green">Aktif</span>'}

</td>

<td class="p-2">

<button

onclick="ubahRole('${item.key}')">

Role

</button>

|

<button

onclick="toggleUser('${item.key}',${u.active===false})">

${u.active===false

?"Aktifkan"

:"Nonaktifkan"}

</button>

|

<button

onclick="hapusUser('${item.key}')"

style="color:red">

Hapus

</button>

</td>

</tr>

`;

});

});

// =======================

function toggleUser(id,status){

database.ref("users/"+id)

.update({

active:status

});

}

// =======================

function ubahRole(id){

database.ref("users/"+id)

.once("value",(snap)=>{

const u=snap.val();

const role=prompt(

"Role Baru",

u.role || "customer"

);

if(role==null)return;

database.ref("users/"+id)

.update({

role:role

});

});

}

// =======================

function hapusUser(id){

if(!confirm("Hapus user?"))

return;

database.ref("users/"+id)

.remove();

}

</script>
