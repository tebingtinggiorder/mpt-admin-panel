<script>

const listKategori =
document.getElementById("category-list");

const form =
document.getElementById("form-category");

// =========================
// TAMBAH KATEGORI
// =========================

form.addEventListener("submit",async(e)=>{

e.preventDefault();

const nama=
document.getElementById("cat-name")
.value.trim();

if(nama==""){

alert("Nama kategori kosong");

return;

}

const id=
database.ref("kategori").push().key;

await database.ref("kategori/"+id).set({

nama:nama,

createdAt:Date.now()

});

form.reset();

});

// =========================
// LOAD KATEGORI
// =========================

database.ref("kategori")
.orderByChild("createdAt")
.on("value",(snap)=>{

listKategori.innerHTML="";

if(!snap.exists()){

listKategori.innerHTML=`

<li class="text-center text-gray-400">

Belum ada kategori

</li>

`;

return;

}

snap.forEach(item=>{

const k=item.val();

listKategori.innerHTML+=`

<li class="flex justify-between items-center border-b py-2">

<div>

<b>${k.nama}</b>

</div>

<div>

<button
onclick="editKategori('${item.key}')"
class="text-blue-600">

Edit

</button>

|

<button
onclick="hapusKategori('${item.key}')"
class="text-red-600">

Hapus

</button>

</div>

</li>

`;

});

});

// =========================
// EDIT
// =========================

function editKategori(id){

database.ref("kategori/"+id)

.once("value",(snap)=>{

const k=snap.val();

const nama=
prompt("Nama kategori",k.nama);

if(nama==null) return;

database.ref("kategori/"+id)

.update({

nama:nama

});

});

}

// =========================
// HAPUS
// =========================

function hapusKategori(id){

if(!confirm("Hapus kategori ini?")) return;

database.ref("kategori/"+id).remove();

}

</script>
