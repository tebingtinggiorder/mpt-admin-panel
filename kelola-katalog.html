<script>

const tbody =
document.getElementById("catalog-table-body");

// ======================
// LOAD PRODUK
// ======================

database.ref("produk").on("value",(snap)=>{

tbody.innerHTML="";

if(!snap.exists()){

tbody.innerHTML=`
<tr>
<td colspan="5" class="text-center p-5">
Belum ada produk
</td>
</tr>`;

return;

}

snap.forEach(item=>{

const p=item.val();

tbody.innerHTML+=`

<tr class="border-b">

<td class="p-3">

<img
src="${(p.listFoto && p.listFoto.length)?p.listFoto[0]:'https://via.placeholder.com/60'}"
style="width:60px;height:60px;object-fit:cover;border-radius:8px;">

</td>

<td class="p-3">

<b>${p.nama}</b>

<br>

<small>${p.kategori}</small>

</td>

<td class="p-3">

Rp ${Number(p.harga).toLocaleString("id-ID")}

</td>

<td class="p-3">

${p.status===false
?'<span style="color:red">OFF</span>'
:'<span style="color:green">ON</span>'}

</td>

<td class="p-3">

<button
onclick="editProduk('${item.key}')"
class="text-blue-600">

Edit

</button>

|

<button
onclick="toggleProduk('${item.key}',${p.status===false})">

${p.status===false
?'Aktifkan'
:'Nonaktifkan'}

</button>

|

<button
onclick="hapusProduk('${item.key}')"
style="color:red">

Hapus

</button>

</td>

</tr>

`;

});

});

// ======================
// HAPUS
// ======================

function hapusProduk(id){

if(!confirm("Hapus produk ini?")) return;

database.ref("produk/"+id).remove();

}

// ======================
// ON OFF
// ======================

function toggleProduk(id,status){

database.ref("produk/"+id)
.update({

status:status

});

}

// ======================
// EDIT
// ======================

function editProduk(id){

database.ref("produk/"+id)

.once("value",(snap)=>{

const p=snap.val();

let nama=
prompt("Nama Produk",p.nama);

if(nama==null) return;

let harga=
prompt("Harga",p.harga);

if(harga==null) return;

let lokasi=
prompt("Lokasi",p.lokasi);

if(lokasi==null) return;

let deskripsi=
prompt("Deskripsi",p.deskripsi);

if(deskripsi==null) return;

database.ref("produk/"+id)

.update({

nama,

harga:Number(harga),

lokasi,

deskripsi

});

});

}

</script>
