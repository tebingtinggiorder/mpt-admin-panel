<script>

const ref =
database.ref("settings");

// =====================
// LOAD
// =====================

ref.on("value",(snap)=>{

if(!snap.exists()) return;

const s=snap.val();

document.getElementById("shop-name").value =
s.namaToko || "";

document.getElementById("banner-text").value =
s.banner || "";

document.getElementById("shop-whatsapp").value =
s.whatsapp || "";

document.getElementById("shop-address").value =
s.alamat || "";

document.getElementById("maintenance-mode").value =
String(s.maintenance || false);

});

// =====================
// SAVE
// =====================

document
.getElementById("btn-save")

.addEventListener("click",()=>{

ref.update({

namaToko:
document.getElementById("shop-name").value,

banner:
document.getElementById("banner-text").value,

whatsapp:
document.getElementById("shop-whatsapp").value,

alamat:
document.getElementById("shop-address").value,

maintenance:
document.getElementById("maintenance-mode").value==="true",

updatedAt:Date.now()

});

alert("Pengaturan berhasil disimpan.");

});

</script>
