<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan Toko - MPT Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-100 font-sans">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-slate-900 text-slate-300 hidden md:flex flex-col justify-between">
            <div class="p-5">
                <h1 class="text-white text-xl font-bold mb-6">🎋 MPT ADMIN</h1>
                <nav class="space-y-2">
                    <a href="index.html" class="block py-2.5 px-4 rounded hover:bg-slate-800 transition">Dashboard</a>
                    <a href="tambah-produk.html" class="block py-2.5 px-4 rounded hover:bg-slate-800 transition">Tambah Produk</a>
                    <a href="kelola-katalog.html" class="block py-2.5 px-4 rounded hover:bg-slate-800 transition">Kelola Katalog</a>
                    <a href="kelola-kategori.html" class="block py-2.5 px-4 rounded hover:bg-slate-800 transition">Kelola Kategori</a>
                    <a href="laporan-checkout.html" class="block py-2.5 px-4 rounded hover:bg-slate-800 transition">Laporan Checkout</a>
                    <a href="kelola-user.html" class="block py-2.5 px-4 rounded hover:bg-slate-800 transition">Kelola User</a>
                    <a href="pengaturan-toko.html" class="block py-2.5 px-4 rounded bg-blue-600 text-white font-medium">Pengaturan Toko</a>
                </nav>
            </div>
            <div class="p-5 border-t border-slate-800">
                <a href="index.html" class="block text-center bg-red-600 hover:bg-red-700 text-white py-2 rounded transition font-medium">Kembali</a>
            </div>
        </aside>

        <div class="flex-1 flex flex-col overflow-y-auto p-6 space-y-6">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 max-w-2xl">
                <h2 class="text-xl font-bold text-slate-800 mb-4">⚙️ Pengaturan & Status Toko</h2>
                <form id="form-settings" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Nama Toko</label>
                        <input type="text" id="store-name" class="w-full border border-slate-300 rounded-lg p-2.5 text-sm" placeholder="Nama Toko Anda" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Nomor WhatsApp Admin</label>
                        <input type="text" id="store-wa" class="w-full border border-slate-300 rounded-lg p-2.5 text-sm" placeholder="628xxxxxxxxxx" required>
                    </div>
                    <div class="flex items-center space-x-3 pt-2">
                        <input type="checkbox" id="store-maintenance" class="w-4 h-4 text-blue-600 border-slate-300 rounded">
                        <label for="store-maintenance" class="text-sm font-medium text-slate-700">Aktifkan Mode Pemeliharaan (Maintenance)</label>
                    </div>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-2.5 rounded-lg transition">Simpan Pengaturan</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAHFgI1sxXMxu9umSfCQMLB2j4C2zH87N8",
            authDomain: "tebingtinggiorder.firebaseapp.com",
            databaseURL: "https://tebingtinggiorder-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tebingtinggiorder",
            storageBucket: "tebingtinggiorder.firebasestorage.app",
            messagingSenderId: "374470707588",
            appId: "1:374470707588:web:d1fa72f4832753b401f5d1",
            measurementId: "G-BPKTES3HPY"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("form-settings");
            const inputName = document.getElementById("store-name");
            const inputWa = document.getElementById("store-wa");
            const inputMaintenance = document.getElementById("store-maintenance");

            if (!form) return;

            // Muat data pengaturan saat ini dari Firebase
            database.ref("settings").on("value", (snap) => {
                if (snap.exists()) {
                    const data = snap.val();
                    if(inputName) inputName.value = data.namaToko || "";
                    if(inputWa) inputWa.value = data.whatsapp || "";
                    if(inputMaintenance) inputMaintenance.checked = data.maintenance === true;
                }
            });

            // Simpan perubahan pengaturan
            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                try {
                    await database.ref("settings").update({
                        namaToko: inputName.value.trim(),
                        whatsapp: inputWa.value.trim(),
                        maintenance: inputMaintenance.checked,
                        updatedAt: Date.now()
                    });
                    alert("Pengaturan toko berhasil diperbarui!");
                } catch (error) {
                    alert("Gagal menyimpan pengaturan: " + error.message);
                }
            });
        });
    </script>
</body>
</html>
