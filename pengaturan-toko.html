<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pengaturan Toko - Panel Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/auth-guard.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 flex h-screen overflow-hidden">
    <main class="flex-1 flex flex-col h-full overflow-y-auto p-6">
        <h1 class="text-xl font-bold mb-4">Pengaturan Toko & Banner Gift</h1>
        <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200 max-w-xl space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Status Mode Maintenance</label>
                <select id="maintenance-mode" class="w-full border rounded p-2 text-sm">
                    <option value="false">Toko Aktif (Normal)</option>
                    <option value="true">Aktifkan Maintenance</option>
                </select>
            </div>
            <button onclick="alert('Pengaturan disimpan!')" class="bg-blue-600 text-white px-4 py-2 rounded text-sm">Simpan Pengaturan</button>
        </div>
    </main>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="assets/js/firebase-init.js"></script>
</body>
</html>
