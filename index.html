<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Panel Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/auth-guard.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 flex h-screen overflow-hidden">
    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col hidden md:flex">
        <div class="p-5 font-bold text-white text-lg border-b border-slate-800">MPT Admin Panel</div>
        <nav class="flex-1 p-4 space-y-1 text-sm">
            <a href="dashboard.html" class="block px-3 py-2 rounded bg-blue-600 text-white font-medium">📊 Dashboard</a>
            <a href="tambah-produk.html" class="block px-3 py-2 rounded hover:bg-slate-800">➕ Tambah Produk</a>
            <a href="kelola-katalog.html" class="block px-3 py-2 rounded hover:bg-slate-800">📦 Kelola Katalog</a>
            <a href="kelola-kategori.html" class="block px-3 py-2 rounded hover:bg-slate-800">🏷️ Kelola Kategori</a>
            <a href="laporan-checkout.html" class="block px-3 py-2 rounded hover:bg-slate-800">🛒 Laporan Checkout</a>
            <a href="kelola-user.html" class="block px-3 py-2 rounded hover:bg-slate-800">👥 Kelola User</a>
            <a href="pengaturan-toko.html" class="block px-3 py-2 rounded hover:bg-slate-800">⚙️ Pengaturan Toko</a>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <button onclick="localStorage.removeItem('mpt_admin_session_permanent'); window.location.href='../index.html';" class="w-full text-left px-3 py-2 text-red-400 hover:bg-slate-800 rounded text-sm">🚪 Keluar</button>
        </div>
    </aside>
    <main class="flex-1 flex flex-col h-full overflow-y-auto">
        <header class="bg-white shadow-sm h-16 flex items-center justify-between px-6 border-b border-slate-200">
            <h1 class="text-xl font-bold text-slate-800">Dashboard Utama</h1>
            <span id="user-email" class="text-xs bg-slate-100 text-slate-600 px-3 py-1 rounded-full"></span>
        </header>
        <div class="p-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-5 rounded-lg shadow-sm border border-slate-200">
                    <p class="text-xs font-semibold text-slate-400 uppercase">Total Produk</p>
                    <h3 class="text-2xl font-bold text-slate-900 mt-2" id="total-products">0</h3>
                </div>
            </div>
        </div>
    </main>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="assets/js/firebase-init.js"></script>
    <script>
        document.getElementById('user-email').innerText = JSON.parse(localStorage.getItem('mpt_admin_session_permanent')).email;
        database.ref('products').on('value', snap => {
            document.getElementById('total-products').innerText = snap.numChildren();
        });
    </script>
</body>
</html>
