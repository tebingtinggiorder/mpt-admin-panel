<script>
document.addEventListener("DOMContentLoaded", () => {

    // Email Admin
    const session = JSON.parse(localStorage.getItem("mpt_admin_session_permanent") || "{}");

    document.getElementById("user-email").innerText =
        session.email || "Administrator";

    // ============================
    // TOTAL PRODUK
    // ============================
    database.ref("produk").on("value", snap => {

        document.getElementById("total-products").innerText =
            snap.numChildren();

    });

    // ============================
    // TOTAL USER
    // ============================

    if(document.getElementById("total-users")){

        database.ref("users").on("value", snap=>{

            document.getElementById("total-users").innerText =
                snap.numChildren();

        });

    }

    // ============================
    // TOTAL ORDER
    // ============================

    if(document.getElementById("total-orders")){

        database.ref("orders").on("value", snap=>{

            document.getElementById("total-orders").innerText =
                snap.numChildren();

        });

    }

    // ============================
    // TOTAL VISITOR
    // ============================

    if(document.getElementById("total-visitors")){

        database.ref("visitors").on("value", snap=>{

            document.getElementById("total-visitors").innerText =
                snap.numChildren();

        });

    }

    // ============================
    // TOTAL OMZET
    // ============================

    if(document.getElementById("total-sales")){

        database.ref("orders").on("value", snap=>{

            let total = 0;

            snap.forEach(item=>{

                const o = item.val();

                if(o.status=="Selesai"){

                    total += Number(o.total || 0);

                }

            });

            document.getElementById("total-sales").innerText =
                "Rp " + total.toLocaleString("id-ID");

        });

    }

    // ============================
    // PESANAN TERBARU
    // ============================

    if(document.getElementById("latest-orders")){

        database.ref("orders")
        .limitToLast(10)
        .on("value", snap=>{

            let html="";

            let data=[];

            snap.forEach(item=>{

                data.push({
                    id:item.key,
                    ...item.val()
                });

            });

            data.reverse();

            data.forEach(o=>{

                html += `
                <tr class="border-b">

                    <td class="p-2">${o.id}</td>

                    <td class="p-2">
                        ${o.customerName || "-"}
                    </td>

                    <td class="p-2">
                        Rp ${Number(o.total||0).toLocaleString("id-ID")}
                    </td>

                    <td class="p-2">

                        ${o.status || "Pending"}

                    </td>

                </tr>
                `;

            });

            document.getElementById("latest-orders").innerHTML = html;

        });

    }

});
</script>
